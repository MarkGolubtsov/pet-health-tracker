name: pet-health-tracker

services:
  pet-health-tracker-backend:
    image: pet-health-tracker-backend:${PET_HEALTH_TRACKER_VERSION}
    build:
      context: ./pet-health-tracker-backend
      args:
        PET_HEALTH_TRACKER_VERSION: ${PET_HEALTH_TRACKER_VERSION}
    environment:
      PET_HEALTH_TRACKER_VERSION: ${PET_HEALTH_TRACKER_VERSION}
    ports:
      - "${PET_HEALTH_TRACKER_HOST_BIND_ADDRESS:-127.0.0.1}:${PET_HEALTH_TRACKER_BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - pet-health-tracker-app

  pet-health-tracker-frontend:
    image: pet-health-tracker-frontend:${PET_HEALTH_TRACKER_VERSION}
    build:
      context: ./pet-health-tracker-frontend
      args:
        PET_HEALTH_TRACKER_VERSION: ${PET_HEALTH_TRACKER_VERSION}
    environment:
      PET_HEALTH_TRACKER_VERSION: ${PET_HEALTH_TRACKER_VERSION}
    ports:
      - "${PET_HEALTH_TRACKER_HOST_BIND_ADDRESS:-127.0.0.1}:${PET_HEALTH_TRACKER_FRONTEND_PORT:-3000}:80"
    depends_on:
      pet-health-tracker-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - pet-health-tracker-app

networks:
  pet-health-tracker-app:
    driver: bridge
